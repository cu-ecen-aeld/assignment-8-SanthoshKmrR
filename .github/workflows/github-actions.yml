name: assignment-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
    full-test:
        container: cuaesd/aesd-autotest:24-assignment7-buildroot
        runs-on: self-hosted
        timeout-minutes: 120
        steps:
          - uses: actions/checkout@v4
            with:
                fetch-depth: 0
          - name: Checkout submodules
            run: |
                # Self-hosted runner reuses the workspace; wipe any stale/corrupt
                # cached submodule state before a fresh, full (non-shallow) clone.
                git submodule deinit -f --all || true
                rm -rf .git/modules/assignment-autotest .git/modules/buildroot
                git submodule sync --recursive
                git submodule update --init --recursive --force
          - uses: webfactory/ssh-agent@v0.5.3
            with:
                ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          - name: Run full test
            env:
              GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
            run: ./full-test.sh
          - name: Cleanup
            if: always()
            run: |
              ssh-add -D
